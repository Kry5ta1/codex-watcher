name: Release Windows Installer

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload to
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          npm run build
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          npx electron-builder --win nsis --publish never
          $packExit = $LASTEXITCODE

          $installer = Get-ChildItem -LiteralPath dist -Filter '*Setup*.exe' -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            exit $packExit
          }

          if ($packExit -ne 0) {
            Write-Warning "desktop:pack exited with code $packExit after generating the installer; continuing with release upload."
          }

          $package = Get-Content -LiteralPath package.json | ConvertFrom-Json
          $assetName = "Codex-Watcher-Setup-$($package.version).exe"
          $assetPath = Join-Path $installer.DirectoryName $assetName
          Copy-Item -LiteralPath $installer.FullName -Destination $assetPath -Force
          "ASSET_PATH=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          exit 0

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" "$env:ASSET_PATH" --repo "${{ github.repository }}" --clobber
